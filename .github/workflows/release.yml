name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build macOS binary
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Package binary
        run: |
          BIN=$(swift package describe --type json | python3 -c "
import sys, json
pkgs = json.load(sys.stdin)
exes = [p['name'] for p in pkgs['products'] if list(p['type'].keys())[0] == 'executable']
print(exes[0] if exes else 'buildwatch')
")
          cp .build/release/$BIN ./$BIN
          zip ${BIN}-macos.zip $BIN

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*-macos.zip"
